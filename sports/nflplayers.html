<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL Player Vault | Pro & College History</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }

        .hover-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }
        .hover-card:hover {
            transform: translateY(-4px) scale(1.02);
            background: rgba(51, 65, 85, 0.9);
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-left-color: #ef4444;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Swim Lane Scrollbar Hide */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        .swim-lane {
            min-width: 160px;
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-shrink: 0;
        }
        .swim-lane.disabled {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(1);
        }

        .trivia-option {
            transition: all 0.2s;
        }
        .trivia-option:hover:not(:disabled) {
            background-color: rgba(59, 130, 246, 0.2);
            border-color: #3b82f6;
        }
        .trivia-option.correct {
            background-color: rgba(34, 197, 94, 0.2);
            border-color: #22c55e;
            color: #22c55e;
        }
        .trivia-option.wrong {
            background-color: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            color: #ef4444;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Header -->
    <header class="max-w-7xl mx-auto w-full flex flex-col md:flex-row items-center justify-between gap-6 mb-8 shrink-0">
        <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
            <div class="w-12 h-12 bg-green-600 rounded-2xl flex items-center justify-center text-white font-black text-2xl italic">
                🏈
            </div>
            <div>
                <h1 class="text-2xl font-black uppercase tracking-tighter italic">NFL Vault</h1>
                <p class="text-[10px] text-green-400 font-bold uppercase tracking-widest">Roster • College • Stats</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col sm:flex-row items-center gap-4" id="view-controls">
            <!-- Search -->
            <div class="relative">
                <input type="text" id="team-search" oninput="applySearch()" placeholder="Search Teams or Players..." 
                       class="bg-slate-900 text-white text-xs font-bold uppercase p-2 pl-8 rounded-lg border border-slate-700 outline-none focus:border-green-500 w-48">
                <svg class="w-3 h-3 text-slate-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <!-- View Mode -->
            <div class="flex bg-slate-800 p-1 rounded-xl flex-wrap justify-center">
                <button id="btn-view-nfl" onclick="switchView('nfl')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all bg-green-600 text-white shadow-lg">
                    NFL Teams
                </button>
                <button id="btn-view-college" onclick="switchView('college')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white">
                    Colleges
                </button>
                <button id="btn-view-map" onclick="switchView('map')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white">
                    Map View
                </button>
                <button id="btn-view-position" onclick="switchView('position')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white">
                    Positions
                </button>
                <button id="btn-view-number" onclick="switchView('number')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white">
                    Jersey #
                </button>
                <button id="btn-view-depth" onclick="switchView('depth')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white">
                    Depth Charts
                </button>
                <button id="btn-view-trivia" onclick="switchView('trivia')" class="px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white">
                    Trivia
                </button>
            </div>

            <!-- Sort Dropdown -->
            <select id="main-sort" onchange="applyMainSort()" class="bg-slate-900 text-white text-xs font-bold uppercase p-2 rounded-lg border border-slate-700 outline-none focus:border-green-500">
                <!-- Options populated dynamically -->
            </select>
        </div>
    </header>

    <!-- Progress Bar (Initial Load) -->
    <div id="init-loader" class="max-w-xl mx-auto w-full flex flex-col items-center justify-center gap-4 py-20">
        <div class="loader w-12 h-12 border-4"></div>
        <p id="loading-text" class="text-xs font-bold text-slate-400 uppercase tracking-widest">Initializing Vault...</p>
        <div class="w-full bg-slate-800 rounded-full h-2 overflow-hidden">
            <div id="progress-bar" class="bg-green-500 h-full transition-all duration-300" style="width: 0%"></div>
        </div>
    </div>

    <!-- Main Content Area -->
    <main id="main-container" class="max-w-7xl mx-auto w-full flex-grow relative hidden">
        
        <!-- View 1: NFL Teams Grid -->
        <div id="nfl-view" class="view-section">
            <div id="team-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                <!-- Teams injected here -->
            </div>
        </div>

        <!-- View 2: Colleges Grid -->
        <div id="college-view" class="view-section hidden">
            <div class="mb-6 flex justify-between items-end">
                <h2 class="text-xl font-black italic uppercase text-slate-300">Colleges with Active Players</h2>
                <span class="text-xs font-bold text-slate-500 uppercase" id="college-count"></span>
            </div>
            <div id="college-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
                <!-- Colleges injected here -->
            </div>
        </div>

        <!-- View 3: Positions Grid -->
        <div id="position-view" class="view-section hidden">
            <div class="mb-6 flex justify-between items-end">
                <h2 class="text-xl font-black italic uppercase text-slate-300">Players by Position</h2>
            </div>
            <div id="position-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <!-- Positions injected here -->
            </div>
        </div>

        <!-- View 4: Numbers Grid -->
        <div id="number-view" class="view-section hidden">
            <div class="mb-6 flex justify-between items-end">
                <h2 class="text-xl font-black italic uppercase text-slate-300">Players by Jersey Number</h2>
            </div>
            <div id="number-grid" class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-8 gap-3">
                <!-- Numbers injected here -->
            </div>
        </div>

        <!-- View 5: Map View -->
        <div id="map-view" class="view-section hidden flex flex-col gap-4">
            <div class="glass-panel p-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-xl font-black italic uppercase text-white">Geographic Insights</h2>
                
                <div class="flex flex-col sm:flex-row gap-4">
                    <!-- Data Source Toggle -->
                    <div class="flex items-center gap-2 bg-slate-800 p-1 rounded-lg">
                        <span class="text-[10px] uppercase font-bold text-slate-500 px-2">Data:</span>
                        <button onclick="toggleMapOption('data', 'college')" class="map-data-btn px-3 py-1 rounded text-xs font-bold uppercase transition-all" data-value="college">College</button>
                        <button onclick="toggleMapOption('data', 'hometown')" class="map-data-btn px-3 py-1 rounded text-xs font-bold uppercase transition-all" data-value="hometown">Hometown</button>
                    </div>

                    <!-- Scope Toggle -->
                    <div class="flex items-center gap-2 bg-slate-800 p-1 rounded-lg">
                        <span class="text-[10px] uppercase font-bold text-slate-500 px-2">View:</span>
                        <button onclick="toggleMapOption('scope', 'usa')" class="map-scope-btn px-3 py-1 rounded text-xs font-bold uppercase transition-all" data-value="usa">USA</button>
                        <button onclick="toggleMapOption('scope', 'world')" class="map-scope-btn px-3 py-1 rounded text-xs font-bold uppercase transition-all" data-value="world">World</button>
                    </div>
                </div>
            </div>
            <div class="glass-panel flex-grow w-full h-[600px] bg-slate-800 rounded-2xl p-4">
                <div id="map-container" class="w-full h-full"></div>
            </div>
        </div>

        <!-- View X: Depth Charts -->
        <div id="depth-view" class="view-section hidden flex flex-col gap-4">
            <div class="glass-panel p-4 flex items-center justify-between">
                <h2 class="text-xl font-black italic uppercase text-slate-300">Depth Charts</h2>
                <div class="flex items-center gap-3">
                    <div id="depth-filters" class="flex gap-1 bg-slate-800 p-1 rounded-lg">
                        <button onclick="setDepthFilter('all')" id="depth-filter-all" class="px-3 py-1 text-xs font-bold uppercase rounded">All</button>
                        <button onclick="setDepthFilter('offense')" id="depth-filter-offense" class="px-3 py-1 text-xs font-bold uppercase rounded">Offense</button>
                        <button onclick="setDepthFilter('defense')" id="depth-filter-defense" class="px-3 py-1 text-xs font-bold uppercase rounded">Defense</button>
                        <button onclick="setDepthFilter('fantasy')" id="depth-filter-fantasy" class="px-3 py-1 text-xs font-bold uppercase rounded">Fantasy</button>
                    </div>
                    <div id="depth-limit-controls" class="ml-2 flex gap-1 bg-slate-800 p-1 rounded-lg" title="Players per position">
                        <button onclick="setDepthLimit(1)" id="depth-limit-1" class="px-2 py-1 text-xs font-bold uppercase rounded">1</button>
                        <button onclick="setDepthLimit(2)" id="depth-limit-2" class="px-2 py-1 text-xs font-bold uppercase rounded">2</button>
                        <button onclick="setDepthLimit(3)" id="depth-limit-3" class="px-2 py-1 text-xs font-bold uppercase rounded">3</button>
                        <button onclick="setDepthLimit('all')" id="depth-limit-all" class="px-2 py-1 text-xs font-bold uppercase rounded">All</button>
                    </div>
                    <span class="text-xs font-bold text-slate-500 uppercase" id="depth-status">Loading...</span>
                </div>
            </div>

            <div class="glass-panel p-4">
                <div id="depth-container" class="w-full overflow-x-auto overflow-y-auto max-h-[70vh]">
                    <table id="depth-table" class="w-full text-left text-sm border-collapse">
                        <thead id="depth-thead"></thead>
                        <tbody id="depth-tbody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- View 7: Trivia View -->
        <div id="trivia-view" class="view-section hidden flex flex-col gap-6 max-w-4xl mx-auto w-full">
            <!-- Trivia Settings -->
            <div class="glass-panel p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center text-white font-black text-xl italic">?</div>
                    <div>
                        <h2 class="text-xl font-black uppercase italic text-white">NFL Player Trivia</h2>
                        <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest" id="trivia-stats">Score: 0 | Streak: 0</p>
                    </div>
                </div>
                
                <div class="flex gap-4">
                    <select id="trivia-pos-filter" onchange="nextTriviaQuestion()" class="bg-slate-900 text-white text-xs font-bold uppercase p-2 rounded-lg border border-slate-700 outline-none focus:border-blue-500">
                        <option value="all">All Positions</option>
                        <option value="QB">Quarterbacks</option>
                        <option value="RB">Running Backs</option>
                        <option value="WR">Wide Receivers</option>
                        <option value="TE">Tight Ends</option>
                        <option value="Defense">Defense</option>
                    </select>
                    <button onclick="nextTriviaQuestion()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-xs font-black uppercase transition shadow-lg">Next Player</button>
                </div>
            </div>

            <!-- Question Card -->
            <div id="trivia-card" class="glass-panel p-8 flex flex-col items-center gap-8 relative overflow-hidden hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-blue-900/20 to-transparent pointer-events-none"></div>
                
                <!-- Player Tease -->
                <div class="flex flex-col items-center gap-4 z-10">
                    <div class="w-32 h-32 bg-slate-800 rounded-2xl overflow-hidden border-2 border-slate-700 relative">
                        <img id="trivia-player-img" src="" class="w-full h-full object-cover">
                    </div>
                    <h2 id="trivia-player-name" class="text-3xl font-black uppercase italic tracking-tighter text-white"></h2>
                </div>

                <!-- Questions Grid -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full z-10">
                    <!-- Q1: Jersey Number -->
                    <div class="flex flex-col gap-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Jersey Number?</label>
                        <div id="opts-number" class="grid grid-cols-2 gap-2"></div>
                    </div>
                    <!-- Q2: NFL Team -->
                    <div class="flex flex-col gap-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Current Team?</label>
                        <div id="opts-team" class="grid grid-cols-2 gap-2"></div>
                    </div>
                    <!-- Q3: College -->
                    <div class="flex flex-col gap-3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Alma Mater?</label>
                        <div id="opts-college" class="grid grid-cols-2 gap-2"></div>
                    </div>
                </div>

                <!-- Feedback -->
                <div id="trivia-feedback" class="h-6 text-sm font-black uppercase italic tracking-tighter"></div>
            </div>

            <!-- Empty State -->
            <div id="trivia-empty" class="glass-panel p-20 text-center">
                <p class="text-slate-500 font-bold uppercase text-sm mb-4">Click "Next Player" to start the trivia challenge!</p>
                <button onclick="nextTriviaQuestion()" class="px-8 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-black uppercase transition shadow-xl">Start Trivia</button>
            </div>
        </div>

        <!-- View 6: Roster/Player View (Overlay) -->
        <div id="roster-view" class="hidden flex flex-col gap-6 animate-fade-in fixed inset-0 bg-[#0f172a] z-50 overflow-y-auto p-4 md:p-8">
            <!-- Back Button -->
            <div class="max-w-7xl mx-auto w-full">
                <button onclick="closeRoster()" class="mb-6 px-4 py-2 bg-slate-800 rounded-full hover:bg-slate-700 text-slate-300 hover:text-white text-xs font-bold uppercase transition flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to List
                </button>

                <!-- Header -->
                <div class="glass-panel p-8 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden mb-8">
                    <div class="absolute inset-0 bg-gradient-to-r from-green-900 to-transparent opacity-50"></div>
                    
                    <img id="roster-header-logo" src="" class="w-24 h-24 object-contain drop-shadow-2xl z-10">
                    <div class="text-center md:text-left z-10 flex-grow">
                        <h2 id="roster-header-title" class="text-4xl font-black uppercase italic tracking-tighter text-white"></h2>
                        <p id="roster-header-subtitle" class="text-sm font-bold text-green-300 mt-2 tracking-widest uppercase"></p>
                    </div>

                    <!-- Filters -->
                    <div class="z-10 flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                        <input type="text" id="roster-search" oninput="applyFilters()" placeholder="Filter Players..." 
                               class="bg-slate-900 text-white text-xs font-bold uppercase p-3 rounded-xl border border-slate-700 outline-none focus:border-green-500 w-full md:w-40">
                        <select id="position-filter" onchange="applyFilters()" class="bg-slate-900 text-white text-xs font-bold uppercase p-3 rounded-xl border border-slate-700 outline-none focus:border-green-500">
                            <option value="all">All Positions</option>
                            <option value="QB">Quarterback</option>
                            <option value="RB">Running Back</option>
                            <option value="WR">Wide Receiver</option>
                            <option value="TE">Tight End</option>
                            <option value="OL">Offensive Line</option>
                            <option value="DL">Defensive Line</option>
                            <option value="LB">Linebacker</option>
                            <option value="DB">Defensive Back</option>
                            <option value="PK">PK (Kicker)</option>
                            <option value="P">Punter</option>
                        </select>
                        <select id="sort-filter" onchange="applyFilters()" class="bg-slate-900 text-white text-xs font-bold uppercase p-3 rounded-xl border border-slate-700 outline-none focus:border-green-500">
                            <option value="name">Name (A-Z)</option>
                            <option value="jersey">Jersey #</option>
                            <option value="weight">Weight</option>
                            <option value="height">Height</option>
                            <option value="exp">Experience</option>
                        </select>
                    </div>
                </div>

                <!-- Players Grid -->
                <div id="players-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 pb-20">
                    <!-- Player cards injected here -->
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- API Config ---
        const TEAMS_API = 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams';
        const STANDINGS_API = 'https://site.api.espn.com/apis/v2/sports/football/nfl/standings';
        const TEAM_ROSTER_API = (id) => `https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams/${id}/roster`;
        const ATHLETE_OVERVIEW_API = (id) => `https://site.api.espn.com/apis/common/v3/sports/football/nfl/athletes/${id}/overview`;

        // --- State ---
        let nflTeams = []; 
        let collegeMap = {}; 
        let hometownMap = {};
        let countryMap = {}; 
        let positionMap = {};
        let numberMap = {};
        let allPlayers = []; 
        let teamRecords = {};
        let currentRoster = []; 
        let currentView = 'nfl';
        let currentMapData = 'college'; 
        let currentMapScope = 'usa';

        let triviaState = {
            score: 0,
            streak: 0,
            currentPlayer: null,
            answered: { number: false, team: false, college: false }
        };

        const OFFENSE_POS = ['QB','RB','WR','TE','FB','OL','C','OG','OT','G','T'];
        const DEFENSE_POS = ['CB','S','DB','LB','ILB','OLB','DE','DT','DL'];
        const FANTASY_POS = ['QB','RB','WR','TE'];

        function normalizePositionAbbrev(abbrev) {
            if (!abbrev) return abbrev;
            const a = String(abbrev).toUpperCase();
            if (a === 'K') return 'PK';
            return a;
        }

        // --- Caching ---
        const CACHE_KEY = 'nfl_vault_data_v3'; 
        const CACHE_EXPIRY = 1000 * 60 * 60; // 1 hour

        // --- Init ---
        async function init() {
            try {
                const cached = loadFromCache();
                if (cached) {
                    nflTeams = cached.nflTeams;
                    collegeMap = cached.collegeMap;
                    hometownMap = cached.hometownMap || {};
                    positionMap = cached.positionMap || {};
                    numberMap = cached.numberMap || {};
                    allPlayers = cached.allPlayers;
                    renderApp();
                    return; 
                }

                updateProgress(10, "Fetching NFL Teams & Standings...");
                const [teamsRes, standingsRes] = await Promise.all([
                    fetch(TEAMS_API),
                    fetch(STANDINGS_API)
                ]);
                
                if (!teamsRes.ok) throw new Error(`Teams API HTTP error! status: ${teamsRes.status}`);
                if (!standingsRes.ok) throw new Error(`Standings API HTTP error! status: ${standingsRes.status}`);

                const teamsData = await teamsRes.json();
                const standingsData = await standingsRes.json();
                
                processStandings(standingsData);

                const rawTeams = teamsData.sports[0].leagues[0].teams.map(t => t.team);
                
                updateProgress(20, "Scouting Rosters...");
                await fetchAllRosters(rawTeams);

                processLocationData();
                processAttributeData();

                saveToCache();
                renderApp();

            } catch (e) {
                console.error("Init failed", e);
                document.getElementById('loading-text').textContent = `Failed to load data: ${e.message}. Please refresh.`;
                document.getElementById('loading-text').classList.add('text-red-500');
            }
        }

        function loadFromCache() {
            const json = localStorage.getItem(CACHE_KEY);
            if (!json) return null;
            const data = JSON.parse(json);
            if (Date.now() > data.timestamp + CACHE_EXPIRY) return null; 
            return data;
        }

        function saveToCache() {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({
                    timestamp: Date.now(),
                    nflTeams,
                    collegeMap,
                    hometownMap,
                    positionMap,
                    numberMap,
                    allPlayers
                }));
            } catch (e) { console.warn("Cache full", e); }
        }

        function renderApp() {
            updateProgress(100, "Ready!");
            document.getElementById('init-loader').classList.add('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            updateSortOptions();
            renderNflView();
            setDepthFilter('fantasy');
        }

        function processStandings(data) {
            if (!data.children) return;
            const traverse = (node, conference = null) => {
                let currentConf = conference;
                if (node.name === 'American Football Conference') currentConf = 'AFC';
                if (node.name === 'National Football Conference') currentConf = 'NFC';
                
                if (node.standings && node.standings.entries) {
                    node.standings.entries.forEach(entry => {
                        let record = "0-0";
                        if(entry.stats) {
                            const w = entry.stats.find(s => s.name === 'wins')?.value || 0;
                            const l = entry.stats.find(s => s.name === 'losses')?.value || 0;
                            record = `${w}-${l}`;
                        }
                        teamRecords[entry.team.id] = { 
                            record, wins: parseInt(record.split('-')[0]), losses: parseInt(record.split('-')[1]), conference: currentConf 
                        };
                    });
                }
                if (node.children) {
                    node.children.forEach(child => traverse(child, currentConf));
                }
            };
            data.children.forEach(child => traverse(child));
        }

        async function fetchAllRosters(teams) {
            const chunkSize = 8;
            for (let i = 0; i < teams.length; i += chunkSize) {
                const chunk = teams.slice(i, i + chunkSize);
                const promises = chunk.map(async (team) => {
                    try {
                        const rRes = await fetch(TEAM_ROSTER_API(team.id));
                        const rData = await rRes.json();
                        let roster = [];
                        if (rData.athletes) {
                            rData.athletes.forEach(group => { if (group.items) roster = roster.concat(group.items); });
                        }
                        team.roster = roster;
                        team.playerCount = roster.length;
                        const recData = teamRecords[team.id] || { record: "0-0" };
                        team.record = recData.record;
                        nflTeams.push(team);
                        roster.forEach(p => { p.currentTeam = team; allPlayers.push(p); });
                    } catch (err) { console.error('Error fetching roster', team.displayName, err); }
                });
                await Promise.all(promises);
                const percent = 20 + Math.round(((i + chunkSize) / teams.length) * 70);
                updateProgress(Math.min(percent, 90), `Loading Rosters...`);
            }
        }

        function processLocationData() {
            collegeMap = {}; hometownMap = {}; countryMap = {};
            allPlayers.forEach(p => {
                if (p.college && p.college.name) {
                    const cName = p.college.name;
                    if (!collegeMap[cName]) {
                        collegeMap[cName] = { name: cName, id: p.college.id, players: [], logo: p.college.id ? `https://a.espncdn.com/i/teamlogos/ncaa/500/${p.college.id}.png` : "https://a.espncdn.com/i/teamlogos/ncaa/500/0.png" };
                    }
                    collegeMap[cName].players.push(p);
                }
                const locationCode = getLocationCode(p);
                if (locationCode) {
                    if (!hometownMap[locationCode]) hometownMap[locationCode] = { code: locationCode, players: [] };
                    hometownMap[locationCode].players.push(p);
                }
            });
        }

        function processAttributeData() {
            positionMap = {}; numberMap = {};
            allPlayers.forEach(p => {
                const rawPos = p.position ? p.position.abbreviation : 'N/A';
                const pos = normalizePositionAbbrev(rawPos);
                if (!positionMap[pos]) positionMap[pos] = { name: pos, players: [] };
                positionMap[pos].players.push(p);
                const num = p.jersey || '00';
                if (!numberMap[num]) numberMap[num] = { name: num, players: [] };
                numberMap[num].players.push(p);
            });
        }

        function renderNflView(teams = null) {
            const grid = document.getElementById('team-grid');
            const list = teams || nflTeams;
            grid.innerHTML = list.map(team => `
                <div class="hover-card glass-panel p-6 flex flex-col items-center justify-center gap-4 group" onclick="openRoster('nfl', '${team.id}')">
                    <img src="${team.logos[0].href}" class="w-20 h-20 object-contain drop-shadow-lg group-hover:scale-110 transition duration-300">
                    <div class="text-center">
                        <h3 class="text-sm font-black uppercase tracking-wider text-white">${team.displayName}</h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">${team.playerCount} Players</p>
                        <div class="mt-2 px-3 py-1 bg-slate-800 rounded-full inline-block">
                            <span class="text-xs font-black text-green-400 tracking-widest">${team.record}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderCollegeView(colleges = null) {
            const grid = document.getElementById('college-grid');
            const list = colleges || Object.values(collegeMap).sort((a,b) => b.players.length - a.players.length);
            document.getElementById('college-count').textContent = `${list.length} Colleges Found`;
            grid.innerHTML = list.map(c => `
                <div class="hover-card glass-panel p-6 flex flex-col items-center justify-center gap-4 group" onclick="openRoster('college', '${c.name.replace(/'/g, "\\'")}')">
                    <img src="${c.logo}" class="w-16 h-16 object-contain" onerror="this.src='https://a.espncdn.com/i/teamlogos/ncaa/500/0.png'">
                    <div class="text-center">
                        <h3 class="text-xs font-black uppercase tracking-wider text-white truncate w-full">${c.name}</h3>
                        <span class="text-[10px] text-blue-400 font-bold uppercase">${c.players.length} Pro Alumni</span>
                    </div>
                </div>
            `).join('');
        }

        function openRoster(type, id) {
            let title, subtitle, logo;
            if (type === 'nfl') {
                const team = nflTeams.find(t => t.id === id);
                title = team.displayName; subtitle = `Active Roster • ${team.record}`; logo = team.logos[0].href; currentRoster = team.roster; 
            } else if (type === 'college') {
                const college = collegeMap[id];
                title = college.name; subtitle = `NFL Alumni`; logo = college.logo; currentRoster = college.players; 
            } else if (type === 'position') {
                const posData = positionMap[id];
                title = `${id} - Position Group`; subtitle = `Active Players: ${posData.players.length}`; logo = 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nfl.png'; currentRoster = posData.players;
            } else if (type === 'number') {
                const numData = numberMap[id];
                title = `Jersey #${id}`; subtitle = `Active Players: ${numData.players.length}`; logo = 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/leagues/500/nfl.png'; currentRoster = numData.players;
            }
            document.getElementById('roster-header-title').textContent = title;
            document.getElementById('roster-header-subtitle').textContent = subtitle;
            document.getElementById('roster-header-logo').src = logo;
            applyFilters(); 
            document.getElementById('roster-view').classList.remove('hidden');
            document.body.style.overflow = 'hidden'; 
        }

        function applyFilters() {
            const searchVal = document.getElementById('roster-search').value.toLowerCase();
            const posFilter = document.getElementById('position-filter').value;
            const sortVal = document.getElementById('sort-filter').value;
            let filtered = currentRoster.filter(p => p && p.displayName);
            if (searchVal) filtered = filtered.filter(p => p.displayName.toLowerCase().includes(searchVal));
            if (posFilter !== 'all') {
                filtered = filtered.filter(p => {
                    const pos = p.position ? p.position.abbreviation : '';
                    if (posFilter === 'OL') return ['C', 'OG', 'OT', 'OL'].includes(pos);
                    if (posFilter === 'DL') return ['DE', 'DT', 'DL'].includes(pos);
                    if (posFilter === 'LB') return ['ILB', 'OLB', 'LB'].includes(pos);
                    if (posFilter === 'DB') return ['CB', 'S', 'DB'].includes(pos);
                    return pos === posFilter;
                });
            }
            filtered.sort((a,b) => {
                if (sortVal === 'name') return a.displayName.localeCompare(b.displayName);
                if (sortVal === 'jersey') return (parseInt(a.jersey)||99) - (parseInt(b.jersey)||99);
                return 0;
            });
            renderPlayerCards(filtered);
        }

        function renderPlayerCards(players) {
            const grid = document.getElementById('players-grid');
            if (players.length === 0) { grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-10">No players found.</div>'; return; }
            grid.innerHTML = players.map(p => `
                <div class="glass-panel p-4 flex gap-4 relative overflow-hidden group hover:border-green-500/30 transition">
                    <img src="${p.headshot?.href}" class="w-20 h-20 shrink-0 bg-slate-800 rounded-xl object-cover">
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-start">
                            <h3 class="text-lg font-black uppercase text-white truncate">${p.displayName}</h3>
                            <img src="${p.currentTeam.logos[0].href}" class="w-6 h-6">
                        </div>
                        <p class="text-xs font-bold text-slate-500">#${p.jersey || '--'} • ${p.position ? p.position.abbreviation : 'N/A'}</p>
                        <p class="text-[10px] text-slate-400 mt-1">${p.college ? p.college.name : 'No College'}</p>
                    </div>
                </div>`).join('');
        }

        function switchView(view) {
            ['nfl', 'college', 'map', 'position', 'number', 'depth', 'trivia'].forEach(v => {
                const btn = document.getElementById(`btn-view-${v}`);
                if (btn) btn.className = "px-4 py-2 rounded-lg text-xs font-black uppercase transition-all text-slate-400 hover:text-white";
                const viewEl = document.getElementById(`${v}-view`);
                if (viewEl) viewEl.classList.add('hidden');
            });
            const activeBtn = document.getElementById(`btn-view-${view}`);
            if (activeBtn) activeBtn.className = "px-4 py-2 rounded-lg text-xs font-black uppercase transition-all bg-green-600 text-white shadow-lg";
            const activeView = document.getElementById(`${view}-view`);
            if (activeView) activeView.classList.remove('hidden');
            if (view === 'nfl') renderNflView();
            else if (view === 'college') renderCollegeView();
            else if (view === 'trivia') nextTriviaQuestion();
        }

        // --- Trivia Logic ---
        function nextTriviaQuestion() {
            const posFilter = document.getElementById('trivia-pos-filter').value;
            let pool = allPlayers;
            if (posFilter === 'Defense') pool = allPlayers.filter(p => DEFENSE_POS.includes(normalizePositionAbbrev(p.position?.abbreviation)));
            else if (posFilter !== 'all') pool = allPlayers.filter(p => normalizePositionAbbrev(p.position?.abbreviation) === posFilter);
            
            if (pool.length < 5) pool = allPlayers;
            
            const player = pool[Math.floor(Math.random() * pool.length)];
            triviaState.currentPlayer = player;
            triviaState.answered = { number: false, team: false, college: false };
            
            document.getElementById('trivia-empty').classList.add('hidden');
            document.getElementById('trivia-card').classList.remove('hidden');
            document.getElementById('trivia-player-name').textContent = player.displayName;
            document.getElementById('trivia-player-img').src = player.headshot?.href || 'https://a.espncdn.com/i/headshots/nfl/players/full/0.png';
            document.getElementById('trivia-feedback').textContent = '';
            
            renderTriviaOptions('number', player.jersey, pool);
            renderTriviaOptions('team', player.currentTeam.displayName, pool);
            renderTriviaOptions('college', player.college?.name || 'No College', pool);
        }

        function renderTriviaOptions(type, correctVal, currentPool) {
            const container = document.getElementById(`opts-${type}`);
            let distractorPool = [];
            
            if (type === 'number') {
                distractorPool = [...new Set(currentPool.map(p => p.jersey).filter(j => j && j !== correctVal))];
                if (distractorPool.length < 3) distractorPool = Array.from({length: 100}, (_, i) => String(i));
            } else if (type === 'team') {
                distractorPool = [...new Set(currentPool.map(p => p.currentTeam.displayName).filter(t => t !== correctVal))];
                if (distractorPool.length < 3) distractorPool = nflTeams.map(t => t.displayName);
            } else if (type === 'college') {
                distractorPool = [...new Set(currentPool.map(p => p.college?.name).filter(c => c && c && c !== correctVal))];
                if (distractorPool.length < 3) distractorPool = Object.keys(collegeMap);
            }
            
            let options = [correctVal];
            const shuffledDistractors = distractorPool.sort(() => Math.random() - 0.5);
            for (let d of shuffledDistractors) {
                if (options.length >= 4) break;
                if (!options.includes(d) && d) options.push(d);
            }
            
            while(options.length < 4) {
                const rand = type === 'number' ? String(Math.floor(Math.random()*100)) : (type === 'team' ? nflTeams[Math.floor(Math.random()*nflTeams.length)].displayName : Object.keys(collegeMap)[Math.floor(Math.random()*Object.keys(collegeMap).length)]);
                if (!options.includes(rand) && rand) options.push(rand);
            }
            
            options.sort(() => Math.random() - 0.5);
            
            container.innerHTML = options.map(opt => {
                let logoHtml = '';
                if (type === 'team') {
                    const team = nflTeams.find(t => t.displayName === opt);
                    if (team) logoHtml = `<img src="${team.logos[0].href}" class="w-4 h-4 mr-2">`;
                } else if (type === 'college') {
                    const college = collegeMap[opt];
                    if (college) logoHtml = `<img src="${college.logo}" class="w-4 h-4 mr-2" onerror="this.style.display='none'">`;
                }
                
                return `<button onclick="checkTrivia('${type}', '${opt.replace(/'/g, "\\'")}', this)" 
                    class="trivia-option w-full bg-slate-800 border border-slate-700 p-2 rounded-lg text-[10px] font-bold text-white uppercase flex items-center justify-center">
                    ${logoHtml}${opt}
                </button>`;
            }).join('');
        }

        function checkTrivia(type, choice, btn) {
            if (triviaState.answered[type]) return;
            const correct = (type === 'number' ? triviaState.currentPlayer.jersey : 
                           (type === 'team' ? triviaState.currentPlayer.currentTeam.displayName : 
                           (triviaState.currentPlayer.college?.name || 'No College')));
            
            const isCorrect = choice === correct;
            triviaState.answered[type] = true;
            
            // Disable all buttons in this category
            btn.parentElement.querySelectorAll('button').forEach(b => {
                b.disabled = true;
                if (b.textContent.trim() === correct) b.classList.add('correct');
            });
            
            if (isCorrect) {
                btn.classList.add('correct');
                triviaState.score++;
                if (Object.values(triviaState.answered).every(v => v)) triviaState.streak++;
            } else {
                btn.classList.add('wrong');
                triviaState.streak = 0;
            }
            
            document.getElementById('trivia-stats').textContent = `Score: ${triviaState.score} | Streak: ${triviaState.streak}`;
            if (Object.values(triviaState.answered).every(v => v)) {
                document.getElementById('trivia-feedback').textContent = isCorrect ? "PERFECT! 🔥" : "ROUND COMPLETE";
                document.getElementById('trivia-feedback').className = "h-6 text-sm font-black uppercase italic tracking-tighter " + (isCorrect ? "text-green-400" : "text-slate-400");
            }
        }

        // --- Utils ---
        function getLocationCode(p) { return p.birthPlace?.state || p.birthPlace?.country || null; }
        function updateProgress(percent, text) { 
            document.getElementById('progress-bar').style.width = `${percent}%`; 
            document.getElementById('loading-text').textContent = text; 
        }
        function closeRoster() { document.getElementById('roster-view').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function updateSortOptions() {
            const select = document.getElementById('main-sort');
            select.innerHTML = '<option value="alpha">Name (A-Z)</option><option value="count">Count</option>';
        }
        function applyMainSort() { applySearch(); }
        function applySearch() { 
            const term = document.getElementById('team-search').value.toLowerCase();
            if (currentView === 'nfl') renderNflView(nflTeams.filter(t => t.displayName.toLowerCase().includes(term)));
            else if (currentView === 'college') renderCollegeView(Object.values(collegeMap).filter(c => c.name.toLowerCase().includes(term)));
        }

        // --- Depth Chart Logic (Simplified from complete file read) ---
        let depthFilter = 'fantasy';
        let depthPerPositionLimit = 2;
        function setDepthFilter(f) { depthFilter = f; renderDepthView(); }
        function setDepthLimit(l) { depthPerPositionLimit = l; renderDepthView(); }
        async function renderDepthView() {
            const thead = document.getElementById('depth-thead');
            const tbody = document.getElementById('depth-tbody');
            thead.innerHTML = '<tr class="text-xs uppercase text-slate-500"><th>Team</th><th>Depth Chart</th></tr>';
            tbody.innerHTML = nflTeams.map(t => `<tr><td><img src="${t.logos[0].href}" class="w-8 h-8"></td><td class="text-[10px] py-2">${t.roster.slice(0,5).map(p => p.displayName).join(', ')}...</td></tr>`).join('');
        }

        init();
    </script>
</body>
</html>
