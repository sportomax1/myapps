<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Detailed Forecast | WeatherPulse</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #0a84ff;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --separator: #38383a;
            --sunny: #ff9f0a;
            --rainy: #64d2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 80px;
        }

        header {
            padding: max(20px, env(safe-area-inset-top)) 20px 20px;
            background: rgba(20, 20, 22, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 0.5px solid var(--separator);
        }

        .header-content {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-row {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--card-bg);
            border: 1px solid var(--separator);
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn {
            background: var(--card-bg);
            border: 1px solid var(--separator);
            color: white;
            padding: 10px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            background: #2c2c2e;
        }

        .btn-accent {
            background: var(--accent);
            border-color: var(--accent);
        }

        .location-info h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .location-info p {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        main {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 16px;
        }

        section {
            margin-bottom: 32px;
        }

        h2 {
            font-size: 13px;
            text-transform: uppercase;
            color: var(--text-secondary);
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        /* 24 Hour Forecast */
        .hourly-scroll {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 16px;
            scrollbar-width: none;
        }
        .hourly-scroll::-webkit-scrollbar { display: none; }

        .hour-card {
            background: var(--card-bg);
            min-width: 80px;
            padding: 16px 8px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 0.5px solid var(--separator);
        }

        .hour-time { font-size: 13px; font-weight: 600; }
        .hour-temp { font-size: 18px; font-weight: 800; }
        .hour-icon { font-size: 24px; }
        .hour-precip { font-size: 10px; color: var(--rainy); font-weight: 700; }

        /* 7 Day Forecast */
        .daily-list {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 0.5px solid var(--separator);
        }

        .daily-row {
            display: grid;
            grid-template-columns: 80px 40px 1fr 40px 40px;
            align-items: center;
            padding: 16px;
            border-bottom: 0.5px solid var(--separator);
            gap: 12px;
        }

        .daily-row:last-child { border-bottom: none; }

        .day-name { font-weight: 600; font-size: 16px; }
        .day-icon { font-size: 22px; text-align: center; }
        .temp-bar-container {
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            position: relative;
        }
        .temp-bar-fill {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, #0a84ff, #ff9f0a);
            border-radius: 2px;
        }
        .day-low { color: var(--text-secondary); font-weight: 600; text-align: right; }
        .day-high { font-weight: 600; text-align: right; }

        /* Loading */
        #loader, #locationSelector {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000;
            display: none;
        }

        #locationSelector {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
        }

        .selector-content {
            background: var(--card-bg);
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 24px;
            border: 0.5px solid var(--separator);
        }

        .selector-item {
            padding: 16px;
            border-bottom: 0.5px solid var(--separator);
            cursor: pointer;
            transition: background 0.2s;
        }

        .selector-item:last-child { border-bottom: none; }
        .selector-item:hover { background: rgba(255,255,255,0.05); }

        .selector-item .loc-name { font-weight: 700; display: block; font-size: 16px; }
        .selector-item .loc-desc { font-size: 13px; color: var(--text-secondary); margin-top: 4px; display: block; }

        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: var(--card-bg); border-top: 0.5px solid var(--separator);
            display: flex; justify-content: space-around; padding: 10px 0; z-index: 100;
        }
        .nav-bar a {
            color: var(--text-secondary); text-decoration: none; font-size: 12px; font-weight: 700;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }
        .nav-bar a.active { color: var(--accent); }

        @media (max-width: 600px) {
            .location-info h1 { font-size: 20px; }
            .daily-row { font-size: 14px; padding: 12px; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="font-size: 48px; animation: bounce 2s infinite">☁️</div>
        <p style="font-weight: 700; color: var(--accent); margin-top: 16px" id="loaderText">Loading Forecast...</p>
    </div>

    <div id="locationSelector">
        <div class="selector-content">
            <h2 style="margin-top:0; color: white;">Select Location</h2>
            <div id="selectorList"></div>
            <button class="btn" style="width:100%; margin-top:16px;" onclick="document.getElementById('locationSelector').style.display='none'">Cancel</button>
        </div>
    </div>

    <header>
        <div class="header-content">
            <div class="top-row">
                <div class="location-info">
                    <h1 id="cityNameDisplay">Denver, CO</h1>
                    <p id="currentSummary">--° • --</p>
                </div>
                <div id="dateDisplay" style="text-align: right; font-size: 14px; font-weight: 600;"></div>
            </div>
            <div class="search-row">
                <input type="text" id="citySearch" placeholder="Search city (e.g. London, Tokyo)...">
                <button class="btn btn-accent" onclick="searchCity()">🔍</button>
                <button class="btn" onclick="geolocate()" title="Use my location">📍</button>
            </div>
        </div>
    </header>

    <main>
        <section>
            <h2>24-Hour Forecast</h2>
            <div class="hourly-scroll" id="hourlyContainer">
                <!-- Hourly cards injected here -->
            </div>
        </section>

        <section>
            <h2>7-Day Forecast</h2>
            <div class="daily-list" id="dailyContainer">
                <!-- Daily rows injected here -->
            </div>
        </section>

        <section style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="daily-list" style="padding: 16px;">
                <h2 style="margin: 0 0 8px 0;">Sunrise</h2>
                <div id="sunrise" style="font-size: 20px; font-weight: 800;">--:--</div>
            </div>
            <div class="daily-list" style="padding: 16px;">
                <h2 style="margin: 0 0 8px 0;">Sunset</h2>
                <div id="sunset" style="font-size: 20px; font-weight: 800;">--:--</div>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <a href="weatherforecast.html" class="active"><span>📊</span>Details</a>
        <a href="weathermap.html"><span>🗺️</span>Map</a>
        <a href="weatherradar.html"><span>📡</span>Radar</a>
    </nav>

    <script>
        let currentLat = 39.7392;
        let currentLon = -104.9903;
        let currentLocationName = "Denver, CO";

        function getWeatherIcon(code) {
            if (code <= 1) return '☀️';
            if (code <= 3) return '⛅';
            if (code <= 48) return '🌫️';
            if (code <= 55) return '🌦️';
            if (code <= 65) return '🌧️';
            if (code <= 77) return '❄️';
            if (code <= 82) return '🌦️';
            if (code <= 99) return '⛈️';
            return '❓';
        }

        async function fetchWeather(lat, lon, name) {
            const loader = document.getElementById('loader');
            loader.style.display = 'flex';
            
            try {
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m,weathercode,precipitation_probability&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&temperature_unit=fahrenheit&windspeed_unit=mph&precipitation_unit=inch&timezone=auto`;
                const response = await fetch(url);
                const data = await response.json();

                // Header
                document.getElementById('cityNameDisplay').innerText = name;
                document.getElementById('currentSummary').innerText = `Current: ${Math.round(data.current_weather.temperature)}° • Wind: ${data.current_weather.windspeed} mph`;
                document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

                // Hourly
                const hourlyCont = document.getElementById('hourlyContainer');
                hourlyCont.innerHTML = '';
                for (let i = 0; i < 24; i++) {
                    const time = new Date(data.hourly.time[i]);
                    const hourText = i === 0 ? 'Now' : time.toLocaleTimeString('en-US', { hour: 'numeric', hour12: true });
                    const temp = Math.round(data.hourly.temperature_2m[i]);
                    const prob = data.hourly.precipitation_probability[i];
                    
                    hourlyCont.innerHTML += `
                        <div class="hour-card">
                            <span class="hour-time">${hourText}</span>
                            <span class="hour-icon">${getWeatherIcon(data.hourly.weathercode[i])}</span>
                            <span class="hour-temp">${temp}°</span>
                            <span class="hour-precip">${prob > 0 ? prob + '%' : ''}</span>
                        </div>
                    `;
                }

                // Daily
                const dailyCont = document.getElementById('dailyContainer');
                dailyCont.innerHTML = '';
                const minAll = Math.min(...data.daily.temperature_2m_min);
                const maxAll = Math.max(...data.daily.temperature_2m_max);
                const rangeAll = maxAll - minAll;

                for (let i = 0; i < 7; i++) {
                    const dayDate = new Date(data.daily.time[i]);
                    const dayName = i === 0 ? 'Today' : dayDate.toLocaleDateString('en-US', { weekday: 'short' });
                    const high = Math.round(data.daily.temperature_2m_max[i]);
                    const low = Math.round(data.daily.temperature_2m_min[i]);
                    
                    const left = rangeAll === 0 ? 0 : ((low - minAll) / rangeAll) * 100;
                    const width = rangeAll === 0 ? 100 : ((high - low) / rangeAll) * 100;

                    dailyCont.innerHTML += `
                        <div class="daily-row">
                            <span class="day-name">${dayName}</span>
                            <span class="day-icon">${getWeatherIcon(data.daily.weathercode[i])}</span>
                            <div class="temp-bar-container">
                                <div class="temp-bar-fill" style="left: ${left}%; width: ${width}%"></div>
                            </div>
                            <span class="day-low">${low}°</span>
                            <span class="day-high">${high}°</span>
                        </div>
                    `;
                }

                document.getElementById('sunrise').innerText = data.daily.sunrise[0].split('T')[1];
                document.getElementById('sunset').innerText = data.daily.sunset[0].split('T')[1];

                loader.style.display = 'none';

            } catch (err) {
                console.error(err);
                loader.innerHTML = '<p style="color:white">Error loading weather data.</p>';
            }
        }

        async function searchCity() {
            const query = document.getElementById('citySearch').value;
            if (!query) return;

            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loaderText.innerText = "Finding city...";
            loader.style.display = 'flex';

            try {
                const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=en&format=json`;
                const response = await fetch(geoUrl);
                const data = await response.json();

                if (data.results && data.results.length > 0) {
                    if (data.results.length > 1) {
                        showLocationSelector(data.results);
                        loader.style.display = 'none';
                    } else {
                        const city = data.results[0];
                        const name = `${city.name}${city.admin1 ? ', ' + city.admin1 : ''}${city.country_code ? ' ' + city.country_code.toUpperCase() : ''}`;
                        loaderText.innerText = "Loading forecast...";
                        fetchWeather(city.latitude, city.longitude, name);
                    }
                } else {
                    alert("City not found. Try a different search.");
                    loader.style.display = 'none';
                }
            } catch (err) {
                console.error(err);
                alert("Geocoding failed.");
                loader.style.display = 'none';
            }
        }

        function showLocationSelector(results) {
            const selector = document.getElementById('locationSelector');
            const list = document.getElementById('selectorList');
            list.innerHTML = '';

            results.forEach(loc => {
                const item = document.createElement('div');
                item.className = 'selector-item';
                const desc = [loc.admin1, loc.country].filter(Boolean).join(', ');
                item.innerHTML = `
                    <span class="loc-name">${loc.name}</span>
                    <span class="loc-desc">${desc} (Lat: ${loc.latitude.toFixed(2)}, Lon: ${loc.longitude.toFixed(2)})</span>
                `;
                item.onclick = () => {
                    selector.style.display = 'none';
                    const name = `${loc.name}${loc.admin1 ? ', ' + loc.admin1 : ''}${loc.country_code ? ' ' + loc.country_code.toUpperCase() : ''}`;
                    fetchWeather(loc.latitude, loc.longitude, name);
                };
                list.appendChild(item);
            });

            selector.style.display = 'flex';
        }

        function geolocate() {
            if (!navigator.geolocation) {
                alert("Geolocation is not supported by your browser.");
                return;
            }

            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            loaderText.innerText = "Locating you...";
            loader.style.display = 'flex';

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    // Reverse geocoding (approximate)
                    try {
                        loaderText.innerText = "Identifying location...";
                        const revUrl = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`;
                        const response = await fetch(revUrl);
                        const data = await response.json();
                        const name = data.display_name.split(',').slice(0, 2).join(',');
                        
                        loaderText.innerText = "Loading forecast...";
                        fetchWeather(lat, lon, name || "Your Location");
                    } catch (e) {
                        fetchWeather(lat, lon, "Your Location");
                    }
                },
                (error) => {
                    alert("Unable to retrieve your location.");
                    loader.style.display = 'none';
                }
            );
        }

        // Enter key support
        document.getElementById('citySearch').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchCity();
        });

        // Initial load
        fetchWeather(currentLat, currentLon, currentLocationName);
    </script>
</body>
</html>
