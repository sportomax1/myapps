<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Weather Stats Calendar</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #0a84ff;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --separator: #38383a;
            --empty-cell-bg: rgba(255,255,255,0.02);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(20, 20, 22, 0.9);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--separator);
            padding: max(12px, env(safe-area-inset-top)) 12px 12px;
        }

        .header-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .title {
            margin: 0;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        .subtitle {
            margin: 3px 0 0;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }

        .search-row {
            display: flex;
            gap: 8px;
            min-width: 0;
        }

        .options-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        input[type="text"], select {
            flex: 1;
            min-width: 140px;
            background: var(--card-bg);
            border: 1px solid var(--separator);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent);
        }

        .btn {
            border: 1px solid var(--separator);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .recent-wrap {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 2px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .recent-wrap::-webkit-scrollbar { display: none; }

        .recent-chip {
            border: 1px solid var(--separator);
            background: #252527;
            color: var(--text);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
        }

        main {
            max-width: 1200px;
            margin: 12px auto 24px;
            padding: 0 10px;
        }

        #status {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 0 0 8px;
        }

        .table-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .table-wrap {
            overflow: auto;
            border-radius: 12px;
            border: 1px solid var(--separator);
            background: var(--card-bg);
            max-height: calc(100vh - 250px);
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            touch-action: pan-x pan-y;
        }

        table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 5;
            background: #2c2c2e;
            color: var(--text-secondary);
            padding: 8px 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 10px;
            border-bottom: 1px solid var(--separator);
            text-align: center;
        }

        tbody td {
            padding: 7px 8px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            white-space: nowrap;
        }

        .date-col {
            position: sticky;
            left: 0;
            z-index: 4;
            background: var(--card-bg);
            text-align: left;
            font-family: inherit;
            font-weight: 700;
            border-right: 1px solid var(--separator);
            min-width: 102px;
        }

        thead .date-col { z-index: 7; background: #2c2c2e; }
        .current-year-col { font-weight: 800; }
        .heat-cell { transition: transform 0.1s ease; }
        .heat-cell:hover { transform: scale(1.06); outline: 1px solid rgba(255,255,255,0.85); }
        .empty-cell { color: #5d5d61; background: var(--empty-cell-bg); }
        .projected-cell { border-top: 1px dashed rgba(255,255,255,0.2); }
        .month-start td { border-top: 1px solid rgba(255,255,255,0.18); }
        .today-row .date-col { color: #ffd60a; }

        #loader,
        #locationSelector {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.75);
            z-index: 50;
            color: white;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        #locationSelector {
            background: rgba(0,0,0,0.85);
            z-index: 60;
        }

        .selector-content {
            background: var(--card-bg);
            border-radius: 14px;
            width: min(92vw, 460px);
            max-height: 70vh;
            overflow: auto;
            border: 1px solid var(--separator);
            padding: 14px;
        }

        .selector-item {
            border: 1px solid var(--separator);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .selector-item:last-child { margin-bottom: 0; }
        .selector-item .loc-name { font-weight: 700; display: block; }
        .selector-item .loc-desc { color: var(--text-secondary); font-size: 12px; display: block; margin-top: 4px; }

        @media (max-width: 760px) {
            .controls { grid-template-columns: 1fr; }
            input[type="text"] { min-width: 0; }
            .btn { padding: 10px; }
            .table-wrap { max-height: calc(100vh - 280px); }
            tbody td, thead th { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="loader">Loading weather stats…</div>

    <div id="locationSelector">
        <div class="selector-content">
            <h3 style="margin: 0 0 10px;">Multiple locations found</h3>
            <div id="selectorList"></div>
            <button class="btn" id="closeSelectorBtn" style="width: 100%; margin-top: 10px;">Cancel</button>
        </div>
    </div>

    <header>
        <div class="header-wrap">
            <div>
                <h1 class="title">Weather Stats Calendar</h1>
                <p class="subtitle" id="locationLabel">Halls Crossing, Utah</p>
            </div>

            <div class="controls">
                <div class="search-row">
                    <input id="locationInput" type="text" placeholder="Search address, city, state, or zip">
                    <button class="btn btn-primary" id="loadBtn">Update</button>
                </div>
                <div class="options-row">
                    <select id="metricSelect">
                        <option value="temperature_2m_max">Highs (°F)</option>
                        <option value="temperature_2m_min">Lows (°F)</option>
                        <option value="rain_sum">Rain (in)</option>
                        <option value="snowfall_sum">Snow (in)</option>
                        <option value="wind_speed_10m_max">Wind (mph)</option>
                    </select>
                </div>
            </div>

            <div class="recent-wrap" id="recentLocations"></div>
        </div>
    </header>

    <main>
        <p id="status">Showing daily weather stats from 2000 to today. Future dates in the current year use historical averages when available.</p>
        <div class="table-actions">
            <button class="btn" id="todayBtn">Today</button>
            <button class="btn" id="topBtn">Top</button>
        </div>
        <div class="table-wrap" id="tableWrap">
            <table>
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const DEFAULT_LOCATION = {
            name: "Halls Crossing, Utah",
            latitude: 37.4572,
            longitude: -110.7071
        };

        const START_YEAR = 2000;
        const RECENT_KEY = "weatherStatsRecentLocationsV1";
        const MAX_RECENT = 6;

        const METRICS = {
            temperature_2m_max: { label: "high temperatures", shortLabel: "Highs", unit: "°F", digits: 0 },
            temperature_2m_min: { label: "low temperatures", shortLabel: "Lows", unit: "°F", digits: 0 },
            rain_sum: { label: "daily rain totals", shortLabel: "Rain", unit: "in", digits: 2 },
            snowfall_sum: { label: "daily snowfall totals", shortLabel: "Snow", unit: "in", digits: 2 },
            wind_speed_10m_max: { label: "max wind speed", shortLabel: "Wind", unit: "mph", digits: 1 }
        };

        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");
        const statusEl = document.getElementById("status");
        const loader = document.getElementById("loader");
        const locationLabel = document.getElementById("locationLabel");
        const metricSelect = document.getElementById("metricSelect");
        const recentLocationsEl = document.getElementById("recentLocations");
        const tableWrap = document.getElementById("tableWrap");
        const locationInput = document.getElementById("locationInput");

        let latestPayload = null;
        let latestLocation = DEFAULT_LOCATION;
        let latestCurrentYear = new Date().getFullYear();
        let latestToday = new Date();

        function showLoader(show) {
            loader.style.display = show ? "flex" : "none";
        }

        function getRecentLocations() {
            try {
                const parsed = JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
                return Array.isArray(parsed) ? parsed : [];
            } catch {
                return [];
            }
        }

        function saveRecentLocation(location) {
            const matchesLocation = (a, b) => {
                return Math.abs(a.latitude - b.latitude) < 0.0001 && Math.abs(a.longitude - b.longitude) < 0.0001;
            };
            const existing = getRecentLocations().filter((loc) => {
                return !matchesLocation(loc, location);
            });
            const updated = [location, ...existing].slice(0, MAX_RECENT);
            localStorage.setItem(RECENT_KEY, JSON.stringify(updated));
            renderRecentLocations();
        }

        function renderRecentLocations() {
            const recents = getRecentLocations();
            recentLocationsEl.innerHTML = "";
            if (!recents.length) return;
            recents.forEach((location) => {
                const btn = document.createElement("button");
                btn.className = "recent-chip";
                btn.textContent = location.name;
                btn.addEventListener("click", () => loadForLocation(location));
                recentLocationsEl.appendChild(btn);
            });
        }

        function getColor(value, min, max) {
            if (value === null || Number.isNaN(value)) return "var(--empty-cell-bg)";
            const ratio = Math.max(0, Math.min(1, (value - min) / ((max - min) || 1)));
            const hue = 220 - (ratio * 220);
            const lightness = 18 + ratio * 40;
            return `hsl(${hue}, 90%, ${lightness}%)`;
        }

        function formatValue(value, metricKey) {
            const cfg = METRICS[metricKey];
            if (typeof value !== "number") return "--";
            if (cfg.digits === 0) return String(Math.round(value));
            return Number(value).toFixed(cfg.digits);
        }

        async function geocodeLocations(query) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=10&language=en&format=json`;
            const response = await fetch(url);
            const data = await response.json();
            if (!data.results || !data.results.length) return [];
            return data.results.map((hit) => ({
                name: [hit.name, hit.admin1, hit.country].filter(Boolean).join(", "),
                latitude: hit.latitude,
                longitude: hit.longitude
            }));
        }

        function showLocationSelector(locations) {
            const selector = document.getElementById("locationSelector");
            const list = document.getElementById("selectorList");
            list.innerHTML = "";

            locations.forEach((loc) => {
                const item = document.createElement("div");
                item.className = "selector-item";
                item.innerHTML = `
                    <span class="loc-name">${loc.name}</span>
                    <span class="loc-desc">Lat ${loc.latitude.toFixed(2)}, Lon ${loc.longitude.toFixed(2)}</span>
                `;
                item.addEventListener("click", async () => {
                    selector.style.display = "none";
                    await loadForLocation(loc);
                });
                list.appendChild(item);
            });

            selector.style.display = "flex";
        }

        async function fetchArchive(location) {
            const today = new Date();
            const currentYear = today.getFullYear();
            const endDate = today.toISOString().slice(0, 10);
            const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${location.latitude}&longitude=${location.longitude}&start_date=${START_YEAR}-01-01&end_date=${endDate}&daily=temperature_2m_max,temperature_2m_min,rain_sum,snowfall_sum,wind_speed_10m_max&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=auto`;
            const response = await fetch(url);
            return { payload: await response.json(), currentYear, today };
        }

        function buildRows(currentYear, today) {
            const rows = [];
            const d = new Date(currentYear, 0, 1);
            const end = new Date(currentYear, 11, 31);
            while (d <= end) {
                rows.push({
                    monthDay: `${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`,
                    label: d.toLocaleDateString("en-US", { month: "short", day: "2-digit" }),
                    isMonthStart: d.getDate() === 1,
                    isToday: d.toDateString() === today.toDateString(),
                    isFuture: d > today
                });
                d.setDate(d.getDate() + 1);
            }
            return rows;
        }

        function buildYearMap(data, years, metricKey) {
            const byYear = {};
            years.forEach((y) => { byYear[y] = {}; });
            const metricValues = data.daily[metricKey] || [];

            data.daily.time.forEach((iso, i) => {
                const [year, month, day] = iso.split("-");
                if (!byYear[year]) return;
                byYear[year][`${month}-${day}`] = metricValues[i];
            });

            return byYear;
        }

        function buildAverages(dateRows, years, byYear, currentYear) {
            const averages = {};
            dateRows.forEach((row) => {
                const values = years
                    .filter((year) => year !== currentYear)
                    .map((year) => byYear[year]?.[row.monthDay])
                    .filter((v) => typeof v === "number");
                if (values.length) averages[row.monthDay] = values.reduce((sum, v) => sum + v, 0) / values.length;
            });
            return averages;
        }

        function renderCalendar(data, currentYear, today) {
            const metricKey = metricSelect.value;
            const metricCfg = METRICS[metricKey];
            const years = [];
            for (let y = currentYear; y >= START_YEAR; y--) years.push(y);

            const dateRows = buildRows(currentYear, today);
            const byYear = buildYearMap(data, years, metricKey);
            const averages = buildAverages(dateRows, years, byYear, currentYear);

            const allValues = [];
            years.forEach((y) => {
                dateRows.forEach((row) => {
                    const historical = byYear[y]?.[row.monthDay];
                    if (typeof historical === "number") allValues.push(historical);
                    if (y === currentYear && row.isFuture && typeof historical !== "number") {
                        const avg = averages[row.monthDay];
                        if (typeof avg === "number") allValues.push(avg);
                    }
                });
            });

            const min = allValues.length ? Math.min(...allValues) : 0;
            const max = allValues.length ? Math.max(...allValues) : 1;

            const yearHeaders = years.map((year, i) => {
                const klass = i === 0 ? "current-year-col" : "";
                return `<th class="${klass}">${year}</th>`;
            }).join("");
            tableHead.innerHTML = `<th class="date-col">Date</th>${yearHeaders}`;

            tableBody.innerHTML = dateRows.map((row) => {
                const rowClass = `${row.isMonthStart ? "month-start " : ""}${row.isToday ? "today-row" : ""}`.trim();
                const cells = years.map((year, i) => {
                    let value = byYear[year]?.[row.monthDay];
                    let projected = false;
                    if (year === currentYear && row.isFuture && typeof value !== "number") {
                        value = averages[row.monthDay];
                        projected = typeof value === "number";
                    }

                    if (typeof value !== "number") return `<td class="empty-cell">--</td>`;

                    const bg = getColor(value, min, max);
                    const unit = metricCfg.unit;
                    const display = formatValue(value, metricKey);
                    const projectedText = projected ? " (historical avg)" : "";
                    const title = `${year} ${row.label}: ${display}${unit}${projectedText}`;
                    const classes = `heat-cell ${i === 0 ? "current-year-col" : ""} ${projected ? "projected-cell" : ""}`.trim();
                    return `<td class="${classes}" style="background:${bg}" title="${title}">${display}</td>`;
                }).join("");

                const rowId = row.isToday ? ' id="todayRow"' : "";
                return `<tr class="${rowClass}"${rowId}><td class="date-col">${row.label}</td>${cells}</tr>`;
            }).join("");

            const todayRow = document.getElementById("todayRow");
            if (todayRow) {
                todayRow.scrollIntoView({ block: "center", inline: "start" });
            }
        }

        function renderFromLatestData() {
            if (!latestPayload) return;
            renderCalendar(latestPayload, latestCurrentYear, latestToday);
            const metricCfg = METRICS[metricSelect.value];
            statusEl.textContent = `Daily ${metricCfg.label} from ${START_YEAR}–${latestCurrentYear} for ${latestLocation.name}. Future dates in ${latestCurrentYear} use historical averages when available.`;
        }

        async function loadForLocation(location) {
            showLoader(true);
            try {
                locationLabel.textContent = location.name;
                const { payload, currentYear, today } = await fetchArchive(location);
                if (!payload.daily?.time?.length) throw new Error("No archive data returned.");

                latestPayload = payload;
                latestCurrentYear = currentYear;
                latestToday = today;
                latestLocation = location;

                saveRecentLocation(location);
                renderFromLatestData();
            } catch (err) {
                console.error("Weather archive load failed:", err);
                statusEl.textContent = "Unable to load weather data for that location.";
                tableHead.innerHTML = "";
                tableBody.innerHTML = `<tr><td class="date-col">Error</td><td>${err?.message ?? "Unable to retrieve error details."}</td></tr>`;
            } finally {
                showLoader(false);
            }
        }

        async function updateLocation() {
            const query = locationInput.value.trim();
            if (!query) {
                await loadForLocation(DEFAULT_LOCATION);
                return;
            }

            showLoader(true);
            try {
                const locations = await geocodeLocations(query);
                if (!locations.length) {
                    statusEl.textContent = "Location not found. Try another address, city, or zip code.";
                    showLoader(false);
                    return;
                }

                if (locations.length > 1) {
                    showLoader(false);
                    statusEl.textContent = `Found ${locations.length} matching locations. Please confirm one.`;
                    showLocationSelector(locations);
                    return;
                }

                await loadForLocation(locations[0]);
            } catch {
                statusEl.textContent = "Location lookup failed.";
                showLoader(false);
            }
        }

        document.getElementById("loadBtn").addEventListener("click", updateLocation);
        locationInput.addEventListener("keydown", (e) => {
            if (e.key === "Enter") updateLocation();
        });

        metricSelect.addEventListener("change", renderFromLatestData);

        document.getElementById("todayBtn").addEventListener("click", () => {
            const todayRow = document.getElementById("todayRow");
            if (todayRow) todayRow.scrollIntoView({ behavior: "smooth", block: "center", inline: "start" });
        });

        document.getElementById("topBtn").addEventListener("click", () => {
            tableWrap.scrollTo({ top: 0, left: 0, behavior: "smooth" });
        });

        document.getElementById("closeSelectorBtn").addEventListener("click", () => {
            document.getElementById("locationSelector").style.display = "none";
        });

        renderRecentLocations();
        const recents = getRecentLocations();
        loadForLocation(recents.length ? recents[0] : DEFAULT_LOCATION);
    </script>
</body>
</html>
