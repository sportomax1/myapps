<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>High Temperature Calendar</title>
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #0a84ff;
            --text: #ffffff;
            --text-secondary: #8e8e93;
            --separator: #38383a;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 20;
            background: rgba(20, 20, 22, 0.88);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--separator);
            padding: max(14px, env(safe-area-inset-top)) 16px 14px;
        }

        .header-wrap {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .title {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.4px;
        }

        .subtitle {
            margin: 4px 0 0;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 600;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        input[type="text"] {
            flex: 1;
            min-width: 220px;
            background: var(--card-bg);
            border: 1px solid var(--separator);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--accent); }

        .btn {
            border: 1px solid var(--separator);
            background: var(--card-bg);
            color: var(--text);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 14px auto 28px;
            padding: 0 12px;
        }

        .table-wrap {
            overflow: auto;
            border-radius: 12px;
            border: 1px solid var(--separator);
            background: var(--card-bg);
            max-height: calc(100vh - 190px);
        }

        table {
            width: max-content;
            min-width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 5;
            background: #2c2c2e;
            color: var(--text-secondary);
            padding: 9px 10px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            font-size: 10px;
            border-bottom: 1px solid var(--separator);
            text-align: center;
        }

        tbody td {
            padding: 8px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            font-family: "SF Mono", Menlo, Consolas, monospace;
            white-space: nowrap;
        }

        .date-col {
            position: sticky;
            left: 0;
            z-index: 4;
            background: var(--card-bg);
            text-align: left;
            font-family: inherit;
            font-weight: 700;
            border-right: 1px solid var(--separator);
            min-width: 110px;
        }

        thead .date-col { z-index: 7; background: #2c2c2e; }
        .current-year-col { font-weight: 800; }
        .heat-cell { transition: transform 0.1s ease; }
        .heat-cell:hover { transform: scale(1.08); outline: 1px solid rgba(255,255,255,0.85); }
        .empty-cell { color: #5d5d61; background: rgba(255,255,255,0.02); }

        #status {
            color: var(--text-secondary);
            font-size: 13px;
            margin: 0 2px 10px;
        }

        #loader {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.75);
            z-index: 50;
            color: white;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="loader">Loading historical weather…</div>

    <header>
        <div class="header-wrap">
            <div>
                <h1 class="title">High Temperature Calendar</h1>
                <p class="subtitle" id="locationLabel">Halls Crossing, Utah</p>
            </div>
            <div class="controls">
                <input id="locationInput" type="text" placeholder="Change location (city, state, zip)">
                <button class="btn btn-primary" id="loadBtn">Update</button>
            </div>
        </div>
    </header>

    <main>
        <p id="status">Showing daily highs for this year compared with previous years.</p>
        <div class="table-wrap">
            <table>
                <thead><tr id="tableHead"></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </main>

    <script>
        const DEFAULT_LOCATION = {
            name: "Halls Crossing, Utah",
            latitude: 37.4572,
            longitude: -110.7071
        };

        const YEARS_TO_SHOW = 15;
        const tableHead = document.getElementById("tableHead");
        const tableBody = document.getElementById("tableBody");
        const statusEl = document.getElementById("status");
        const loader = document.getElementById("loader");

        function showLoader(show) {
            loader.style.display = show ? "flex" : "none";
        }

        function getColor(value, min, max) {
            if (value === null || Number.isNaN(value)) return "rgba(255,255,255,0.02)";
            const ratio = Math.max(0, Math.min(1, (value - min) / ((max - min) || 1)));
            const hue = 220 - (ratio * 220);
            const lightness = 18 + ratio * 40;
            return `hsl(${hue}, 90%, ${lightness}%)`;
        }

        async function geocodeLocation(query) {
            const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=1&language=en&format=json`;
            const response = await fetch(url);
            const data = await response.json();
            if (!data.results || !data.results.length) return null;
            const hit = data.results[0];
            return {
                name: [hit.name, hit.admin1, hit.country].filter(Boolean).join(", "),
                latitude: hit.latitude,
                longitude: hit.longitude
            };
        }

        async function fetchArchive(location) {
            const today = new Date();
            const currentYear = today.getFullYear();
            const startYear = currentYear - YEARS_TO_SHOW;
            const endDate = today.toISOString().slice(0, 10);
            const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${location.latitude}&longitude=${location.longitude}&start_date=${startYear}-01-01&end_date=${endDate}&daily=temperature_2m_max&temperature_unit=fahrenheit&timezone=auto`;
            const response = await fetch(url);
            return { payload: await response.json(), currentYear, startYear, today };
        }

        function buildRows(currentYear, today) {
            const rows = [];
            const d = new Date(currentYear, 0, 1);
            while (d <= today) {
                rows.push({
                    monthDay: `${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`,
                    label: d.toLocaleDateString("en-US", { month: "short", day: "2-digit" })
                });
                d.setDate(d.getDate() + 1);
            }
            return rows;
        }

        function renderCalendar(data, currentYear, startYear, today) {
            const years = [];
            for (let y = currentYear; y >= startYear; y--) years.push(y);

            const dateRows = buildRows(currentYear, today);
            const byYear = {};
            years.forEach(y => { byYear[y] = {}; });

            data.daily.time.forEach((iso, i) => {
                const [year, month, day] = iso.split("-");
                if (!byYear[year]) return;
                byYear[year][`${month}-${day}`] = data.daily.temperature_2m_max[i];
            });

            const allTemps = [];
            years.forEach(y => {
                dateRows.forEach(row => {
                    const v = byYear[y]?.[row.monthDay];
                    if (typeof v === "number") allTemps.push(v);
                });
            });
            const min = Math.min(...allTemps);
            const max = Math.max(...allTemps);

            tableHead.innerHTML = `<th class="date-col">Date</th>${years.map((y, i) => `<th class="${i === 0 ? "current-year-col" : ""}">${y}${i === 0 ? " (This Year)" : ""}</th>`).join("")}`;

            tableBody.innerHTML = dateRows.map(row => {
                const cells = years.map((year, i) => {
                    const v = byYear[year]?.[row.monthDay];
                    if (typeof v !== "number") return `<td class="empty-cell">--</td>`;
                    const bg = getColor(v, min, max);
                    return `<td class="heat-cell ${i === 0 ? "current-year-col" : ""}" style="background:${bg}" title="${year} ${row.label}: ${Math.round(v)}°F">${Math.round(v)}°</td>`;
                }).join("");
                return `<tr><td class="date-col">${row.label}</td>${cells}</tr>`;
            }).join("");
        }

        async function loadForLocation(location) {
            showLoader(true);
            try {
                document.getElementById("locationLabel").textContent = location.name;
                const { payload, currentYear, startYear, today } = await fetchArchive(location);
                if (!payload.daily?.time?.length) throw new Error("No archive data returned.");
                renderCalendar(payload, currentYear, startYear, today);
                statusEl.textContent = `Daily high temperatures from ${startYear}–${currentYear} for ${location.name}.`;
            } catch (err) {
                statusEl.textContent = "Unable to load weather data for that location.";
                tableHead.innerHTML = "";
                tableBody.innerHTML = `<tr><td class="date-col">Error</td><td>${err.message}</td></tr>`;
            } finally {
                showLoader(false);
            }
        }

        async function updateLocation() {
            const query = document.getElementById("locationInput").value.trim();
            if (!query) {
                await loadForLocation(DEFAULT_LOCATION);
                return;
            }
            showLoader(true);
            try {
                const location = await geocodeLocation(query);
                if (!location) {
                    statusEl.textContent = "Location not found. Try a nearby city or zip code.";
                    showLoader(false);
                    return;
                }
                await loadForLocation(location);
            } catch {
                statusEl.textContent = "Location lookup failed.";
                showLoader(false);
            }
        }

        document.getElementById("loadBtn").addEventListener("click", updateLocation);
        document.getElementById("locationInput").addEventListener("keydown", (e) => {
            if (e.key === "Enter") updateLocation();
        });

        loadForLocation(DEFAULT_LOCATION);
    </script>
</body>
</html>
