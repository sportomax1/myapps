<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Pulse | Clock Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.6);
            --accent: #38bdf8;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 40%), 
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.08) 0px, transparent 40%);
            color: #f8fafc;
            min-height: 100vh;
        }
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        .pulse { animation: pulse-slow 3s infinite; }

        /* Leaflet Overrides */
        #map { height: 100%; width: 100%; background: transparent; border-radius: 2rem; }
        .leaflet-container { background: transparent !important; }
        .clock-marker {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 12px;
            padding: 4px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            min-width: 80px;
            color: white;
        }
        .clock-city { font-size: 7px; text-transform: uppercase; font-weight: 900; color: var(--accent); margin-bottom: 1px; letter-spacing: 0.1em; }
        .clock-time { font-size: 11px; font-weight: 800; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="p-4 md:p-8 lg:p-12 max-w-7xl mx-auto">

    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-center gap-6 mb-12">
        <div class="flex items-center gap-5">
            <div class="w-14 h-14 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl flex items-center justify-center text-white text-3xl shadow-2xl border border-white/10">
                🌐
            </div>
            <div>
                <h1 class="text-3xl font-black uppercase tracking-tighter">Global Pulse</h1>
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.3em]">Clock Map • Real-time Sync</p>
            </div>
        </div>

        <div class="flex items-center bg-slate-900/50 p-1.5 rounded-2xl border border-white/5">
            <button onclick="setView('map')" id="btn-map" class="px-5 py-2 rounded-xl text-xs font-bold uppercase transition-all bg-blue-600 text-white shadow-lg">Map</button>
            <button onclick="setView('list')" id="btn-list" class="px-5 py-2 rounded-xl text-xs font-bold uppercase transition-all text-slate-400 hover:text-white">List</button>
            <div class="w-px h-4 bg-slate-700 mx-2"></div>
            <button onclick="toggleFormat()" id="btn-format" class="px-5 py-2 rounded-xl text-xs font-bold uppercase transition-all text-slate-400 hover:text-white">24H</button>
        </div>
    </header>

    <!-- Map View (Default) -->
    <div id="map-container" class="glass-card rounded-[2.5rem] p-4 h-[650px] relative overflow-hidden bg-slate-900/20 border border-white/5">
        <div id="map"></div>
    </div>

    <!-- List View (Hidden by default) -->
    <main id="clock-container" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <!-- Clocks injected here -->
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const locations = [
            // North America
            { city: 'Anchorage', tz: 'America/Anchorage', lat: 61.2181, lon: -149.9003 },
            { city: 'Los Angeles', tz: 'America/Los_Angeles', lat: 34.0522, lon: -118.2437 },
            { city: 'Denver', tz: 'America/Denver', lat: 39.7392, lon: -104.9903 },
            { city: 'Chicago', tz: 'America/Chicago', lat: 41.8781, lon: -87.6298 },
            { city: 'New York', tz: 'America/New_York', lat: 40.7128, lon: -74.0060 },
            { city: 'St. John\'s', tz: 'America/St_Johns', lat: 47.5615, lon: -52.7126 },
            { city: 'Mexico City', tz: 'America/Mexico_City', lat: 19.4326, lon: -99.1332 },
            // South America
            { city: 'Lima', tz: 'America/Lima', lat: -12.0464, lon: -77.0428 },
            { city: 'Santiago', tz: 'America/Santiago', lat: -33.4489, lon: -70.6693 },
            { city: 'Buenos Aires', tz: 'America/Argentina/Buenos_Aires', lat: -34.6037, lon: -58.3816 },
            { city: 'Sao Paulo', tz: 'America/Sao_Paulo', lat: -23.5505, lon: -46.6333 },
            { city: 'Noronha', tz: 'America/Noronha', lat: -3.8400, lon: -32.4100 },
            // Europe
            { city: 'London', tz: 'Europe/London', lat: 51.5074, lon: -0.1278 },
            { city: 'Paris', tz: 'Europe/Paris', lat: 48.8566, lon: 2.3522 },
            { city: 'Athens', tz: 'Europe/Athens', lat: 37.9838, lon: 23.7275 },
            { city: 'Moscow', tz: 'Europe/Moscow', lat: 55.7558, lon: 37.6173 },
            // Africa
            { city: 'Casablanca', tz: 'Africa/Casablanca', lat: 33.5731, lon: -7.5898 },
            { city: 'Praia', tz: 'Atlantic/Cape_Verde', lat: 14.9177, lon: -23.5092 },
            { city: 'Lagos', tz: 'Africa/Lagos', lat: 6.5244, lon: 3.3792 },
            { city: 'Cairo', tz: 'Africa/Cairo', lat: 30.0444, lon: 31.2357 },
            { city: 'Nairobi', tz: 'Africa/Nairobi', lat: -1.2921, lon: 36.8219 },
            { city: 'Johannesburg', tz: 'Africa/Johannesburg', lat: -26.2041, lon: 28.0473 },
            { city: 'Port Louis', tz: 'Indian/Mauritius', lat: -20.1609, lon: 57.5012 },
            // Asia
            { city: 'Dubai', tz: 'Asia/Dubai', lat: 25.2048, lon: 55.2708 },
            { city: 'Tehran', tz: 'Asia/Tehran', lat: 35.6892, lon: 51.3890 },
            { city: 'Kabul', tz: 'Asia/Kabul', lat: 34.5553, lon: 69.2075 },
            { city: 'Mumbai', tz: 'Asia/Kolkata', lat: 19.0760, lon: 72.8777 },
            { city: 'Kathmandu', tz: 'Asia/Kathmandu', lat: 27.7172, lon: 85.3240 },
            { city: 'Dhaka', tz: 'Asia/Dhaka', lat: 23.8103, lon: 90.4125 },
            { city: 'Yangon', tz: 'Asia/Yangon', lat: 16.8661, lon: 96.1951 },
            { city: 'Bangkok', tz: 'Asia/Bangkok', lat: 13.7563, lon: 100.5018 },
            { city: 'Singapore', tz: 'Asia/Singapore', lat: 1.3521, lon: 103.8198 },
            { city: 'Beijing', tz: 'Asia/Shanghai', lat: 39.9042, lon: 116.4074 },
            { city: 'Tokyo', tz: 'Asia/Tokyo', lat: 35.6762, lon: 139.6503 },
            { city: 'Seoul', tz: 'Asia/Seoul', lat: 37.5665, lon: 126.9780 },
            // Australia/Oceania
            { city: 'Perth', tz: 'Australia/Perth', lat: -31.9505, lon: 115.8605 },
            { city: 'Darwin', tz: 'Australia/Darwin', lat: -12.4634, lon: 130.8456 },
            { city: 'Sydney', tz: 'Australia/Sydney', lat: -33.8688, lon: 151.2093 },
            { city: 'Adelaide', tz: 'Australia/Adelaide', lat: -34.9285, lon: 138.6007 },
            { city: 'Auckland', tz: 'Pacific/Auckland', lat: -36.8485, lon: 174.7633 },
            { city: 'Honolulu', tz: 'Pacific/Honolulu', lat: 21.3069, lon: -157.8583 },
            { city: 'Pago Pago', tz: 'Pacific/Pago_Pago', lat: -14.2781, lon: -170.7025 },
            { city: 'Kiritimati', tz: 'Pacific/Kiritimati', lat: 1.8871, lon: -157.4333 },
            // Antarctica
            { city: 'McMurdo', tz: 'Antarctica/McMurdo', lat: -77.8419, lon: 166.6863 },
            { city: 'Vostok', tz: 'Antarctica/Vostok', lat: -78.4644, lon: 106.8373 },
            { city: 'Casey', tz: 'Antarctica/Casey', lat: -66.2811, lon: 110.5244 },
            { city: 'Palmer', tz: 'Antarctica/Palmer', lat: -64.7742, lon: -64.0531 }
        ];

        let is24Hour = false;
        let currentView = 'map';
        let map = null;
        const markers = [];

        function formatTime(tz) {
            try {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: !is24Hour
                }).format(new Date());
            } catch(e) { return "--:--"; }
        }

        function formatDate(tz) {
            try {
                return new Intl.DateTimeFormat('en-US', {
                    timeZone: tz,
                    weekday: 'short',
                    month: 'short',
                    day: 'numeric'
                }).format(new Date());
            } catch(e) { return "---"; }
        }

        function renderList() {
            const container = document.getElementById('clock-container');
            container.innerHTML = locations.map(loc => `
                <div class="glass-card rounded-[2rem] p-6 flex flex-col items-center justify-center text-center group hover:scale-[1.02] transition-transform">
                    <p class="text-[9px] font-black text-blue-400 uppercase tracking-[0.3em] mb-2">${loc.city}</p>
                    <h2 class="text-3xl font-black tabular-nums text-white mb-1">${formatTime(loc.tz)}</h2>
                    <p class="text-[9px] font-bold text-slate-500 uppercase">${formatDate(loc.tz)}</p>
                    <div class="mt-4 w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                        <div class="h-full bg-blue-500/50 pulse w-full"></div>
                    </div>
                </div>
            `).join('');
        }

        function initMap() {
            if (map) return;
            map = L.map('map', { zoomSnap: 0.5, zoomControl: false }).setView([10, 0], 2);
            L.control.zoom({ position: 'bottomleft' }).addTo(map);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            locations.forEach(loc => {
                const icon = L.divIcon({
                    className: '',
                    html: `
                        <div class="clock-marker" id="clock-map-${loc.city.replace(/[^a-zA-Z]/g, '')}">
                            <div class="clock-city">${loc.city}</div>
                            <div class="clock-time">${formatTime(loc.tz).split(' ')[0]}</div>
                        </div>
                    `,
                    iconSize: [80, 40],
                    iconAnchor: [40, 20]
                });

                const marker = L.marker([loc.lat, loc.lon], { icon }).addTo(map);
                markers.push({ marker, loc });
            });
        }

        function updateClocks() {
            if (currentView === 'list') {
                renderList();
            } else {
                markers.forEach(({ loc }) => {
                    const element = document.querySelector(`#clock-map-${loc.city.replace(/[^a-zA-Z]/g, '')} .clock-time`);
                    if (element) {
                        element.innerText = formatTime(loc.tz).split(' ')[0];
                    }
                });
            }
        }

        function setView(view) {
            currentView = view;
            const clockGrid = document.getElementById('clock-container');
            const mapBox = document.getElementById('map-container');
            const btnList = document.getElementById('btn-list');
            const btnMap = document.getElementById('btn-map');

            if (view === 'list') {
                clockGrid.classList.remove('hidden');
                clockGrid.classList.add('grid');
                mapBox.classList.add('hidden');
                btnList.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
                btnList.classList.remove('text-slate-400');
                btnMap.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                btnMap.classList.add('text-slate-400');
            } else {
                clockGrid.classList.add('hidden');
                clockGrid.classList.remove('grid');
                mapBox.classList.remove('hidden');
                btnMap.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
                btnMap.classList.remove('text-slate-400');
                btnList.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                btnList.classList.add('text-slate-400');
                
                setTimeout(() => {
                    initMap();
                    map.invalidateSize();
                }, 100);
            }
            updateClocks();
        }

        function toggleFormat() {
            is24Hour = !is24Hour;
            document.getElementById('btn-format').innerText = is24Hour ? '12H' : '24H';
            
            if (currentView === 'map' && markers.length > 0) {
                markers.forEach(({ marker, loc }) => {
                    marker.setIcon(L.divIcon({
                        className: '',
                        html: `
                            <div class="clock-marker" id="clock-map-${loc.city.replace(/[^a-zA-Z]/g, '')}">
                                <div class="clock-city">${loc.city}</div>
                                <div class="clock-time">${formatTime(loc.tz).split(' ')[0]}</div>
                            </div>
                        `,
                        iconSize: [80, 40],
                        iconAnchor: [40, 20]
                    }));
                });
            }
            updateClocks();
        }

        setInterval(updateClocks, 1000);
        
        // Initial load
        initMap();
        setView('map');
    </script>
</body>
</html>
