<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏈🏀⚾🏒 Sports Dashboard (ESPN API SPA)</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2b;
      --panel-2: #17233a;
      --text: #e8eefc;
      --muted: #9fb0d4;
      --accent: #4c8dff;
      --ok: #22c55e;
      --warn: #f59e0b;
      --border: #233252;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #0b1220 0%, #0a1020 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      width: min(1200px, 94vw);
      margin: 24px auto 40px;
      display: grid;
      gap: 16px;
    }

    .topbar, .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      padding: 14px;
      justify-content: space-between;
    }

    .brand {
      font-weight: 700;
      letter-spacing: .2px;
    }

    .league-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .league-btn, .tab-btn, .search-btn {
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-weight: 600;
    }

    .league-btn.active, .tab-btn.active {
      border-color: var(--accent);
      background: #1d325d;
    }

    .search {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .search input {
      background: #0b1426;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 10px;
      min-width: 200px;
    }

    .scoreboard {
      padding: 14px;
    }

    .panel-title {
      font-size: 13px;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: .6px;
      margin-bottom: 10px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }

    .game-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      gap: 7px;
    }

    .team-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
    }

    .tabs {
      padding: 10px 14px 0;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
    }

    .tab-content {
      padding: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    th, td {
      text-align: left;
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    th {
      background: #12203b;
      color: #c6d7ff;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .status-live { color: var(--ok); font-weight: 700; }
    .status-final { color: var(--warn); font-weight: 700; }

    .empty {
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 10px;
      padding: 14px;
    }

    .loading {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    @media (max-width: 640px) {
      .search input { min-width: 150px; width: 100%; }
      .search { width: 100%; }
      .search-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="topbar">
      <div class="brand">🏈🏀⚾🏒 Sports Dashboard (ESPN API SPA)</div>
      <div class="league-group" id="league-group"></div>
      <div class="search">
        <input id="search-input" type="text" placeholder="Search teams or abbreviations..." />
        <button class="search-btn" id="search-btn">🔍 Search</button>
      </div>
    </section>

    <section class="panel scoreboard">
      <div class="panel-title" id="scoreboard-title">Scoreboard</div>
      <div id="scoreboard-loading" class="loading">Loading live and final games...</div>
      <div id="games-grid" class="games-grid"></div>
    </section>

    <section class="panel">
      <div class="tabs" id="tabs"></div>
      <div class="tab-content" id="tab-content"></div>
    </section>
  </div>

  <script>
    const leagues = {
      nfl: {
        label: 'NFL',
        sport: 'football',
        league: 'nfl',
        scoreboard: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/scoreboard',
        standings: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/standings',
        teams: 'https://site.api.espn.com/apis/site/v2/sports/football/nfl/teams'
      },
      nba: {
        label: 'NBA',
        sport: 'basketball',
        league: 'nba',
        scoreboard: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard',
        standings: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/standings',
        teams: 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/teams'
      },
      mlb: {
        label: 'MLB',
        sport: 'baseball',
        league: 'mlb',
        scoreboard: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard',
        standings: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/standings',
        teams: 'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/teams'
      },
      nhl: {
        label: 'NHL',
        sport: 'hockey',
        league: 'nhl',
        scoreboard: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/scoreboard',
        standings: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/standings',
        teams: 'https://site.api.espn.com/apis/site/v2/sports/hockey/nhl/teams'
      }
    };

    const tabs = ['Scores', 'Standings', 'Schedule', 'Teams'];
    const state = {
      league: localStorage.getItem('sports-dashboard-league') || 'nfl',
      tab: 'Scores',
      scoreboard: null,
      standings: null,
      teams: null
    };

    function safe(value, fallback = '-') {
      return value ?? fallback;
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Request failed (${res.status})`);
      return res.json();
    }

    function renderLeagueToggle() {
      const wrap = document.getElementById('league-group');
      wrap.innerHTML = Object.entries(leagues).map(([key, def]) => `
        <button class="league-btn ${key === state.league ? 'active' : ''}" data-league="${key}">${def.label}</button>
      `).join('');

      wrap.querySelectorAll('.league-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.league = btn.dataset.league;
          localStorage.setItem('sports-dashboard-league', state.league);
          renderLeagueToggle();
          loadLeagueData();
        });
      });
    }

    function renderTabs() {
      const tabRoot = document.getElementById('tabs');
      tabRoot.innerHTML = tabs.map(tab => `
        <button class="tab-btn ${tab === state.tab ? 'active' : ''}" data-tab="${tab}">${tab}</button>
      `).join('');

      tabRoot.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.tab = btn.dataset.tab;
          renderTabs();
          renderActiveTab();
        });
      });
    }

    function statusClass(detail = '') {
      const d = detail.toLowerCase();
      if (d.includes('final')) return 'status-final';
      if (d.includes('live') || d.includes('q') || d.includes('period')) return 'status-live';
      return '';
    }

    function renderScoreboardCards() {
      const grid = document.getElementById('games-grid');
      const loading = document.getElementById('scoreboard-loading');
      const events = state.scoreboard?.events || [];
      loading.style.display = 'none';

      if (!events.length) {
        grid.innerHTML = `<div class="empty">No games returned for this league right now.</div>`;
        return;
      }

      grid.innerHTML = events.map(event => {
        const comp = event.competitions?.[0];
        const competitors = comp?.competitors || [];
        const away = competitors.find(c => c.homeAway === 'away') || {};
        const home = competitors.find(c => c.homeAway === 'home') || {};
        const detail = event.status?.type?.shortDetail || event.status?.type?.description || 'Scheduled';
        return `
          <article class="game-card">
            <div class="meta ${statusClass(detail)}">${detail}</div>
            <div class="team-row"><span>${safe(away.team?.displayName, 'Away')}</span><strong>${safe(away.score, '0')}</strong></div>
            <div class="team-row"><span>${safe(home.team?.displayName, 'Home')}</span><strong>${safe(home.score, '0')}</strong></div>
            <div class="meta">${new Date(event.date).toLocaleString()}</div>
          </article>
        `;
      }).join('');
    }

    function renderScoresTab() {
      const events = state.scoreboard?.events || [];
      if (!events.length) return '<div class="empty">No score data available.</div>';
      const rows = events.map(event => {
        const comp = event.competitions?.[0];
        const competitors = comp?.competitors || [];
        const away = competitors.find(c => c.homeAway === 'away') || {};
        const home = competitors.find(c => c.homeAway === 'home') || {};
        const status = event.status?.type?.shortDetail || 'Scheduled';
        return `<tr>
          <td>${safe(away.team?.abbreviation)} @ ${safe(home.team?.abbreviation)}</td>
          <td>${safe(away.score, '0')} - ${safe(home.score, '0')}</td>
          <td class="${statusClass(status)}">${status}</td>
          <td>${new Date(event.date).toLocaleString()}</td>
        </tr>`;
      }).join('');

      return `<table>
        <thead><tr><th>Matchup</th><th>Score</th><th>Status</th><th>Date</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function flattenStandings(data) {
      const out = [];
      (data?.children || []).forEach(group => {
        (group.standings?.entries || []).forEach(entry => {
          const team = entry.team || {};
          const stats = Object.fromEntries((entry.stats || []).map(s => [s.name, s.displayValue || s.value]));
          out.push({
            group: group.name || '-',
            team: team.displayName || '-',
            abbreviation: team.abbreviation || '-',
            wins: stats.wins ?? stats.w ?? '-',
            losses: stats.losses ?? stats.l ?? '-',
            pct: stats.winPercent ?? stats.winPercentage ?? '-',
            streak: stats.streak ?? '-'
          });
        });
      });
      return out;
    }

    function renderStandingsTab() {
      const rowsData = flattenStandings(state.standings);
      if (!rowsData.length) return '<div class="empty">No standings data available.</div>';
      const rows = rowsData.map(item => `<tr>
        <td>${item.group}</td><td>${item.team}</td><td>${item.wins}</td><td>${item.losses}</td><td>${item.pct}</td><td>${item.streak}</td>
      </tr>`).join('');
      return `<table>
        <thead><tr><th>Division/Conference</th><th>Team</th><th>W</th><th>L</th><th>Pct</th><th>Streak</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function renderScheduleTab() {
      const events = (state.scoreboard?.events || []).slice().sort((a, b) => new Date(a.date) - new Date(b.date));
      if (!events.length) return '<div class="empty">No schedule data available.</div>';
      const rows = events.map(event => {
        const comp = event.competitions?.[0];
        const competitors = comp?.competitors || [];
        const away = competitors.find(c => c.homeAway === 'away') || {};
        const home = competitors.find(c => c.homeAway === 'home') || {};
        return `<tr>
          <td>${safe(away.team?.displayName)} @ ${safe(home.team?.displayName)}</td>
          <td>${new Date(event.date).toLocaleString()}</td>
          <td>${safe(event.venue?.fullName, 'TBD')}</td>
        </tr>`;
      }).join('');

      return `<table>
        <thead><tr><th>Game</th><th>Date</th><th>Venue</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function teamRows() {
      return (state.teams?.sports?.[0]?.leagues?.[0]?.teams || []).map(t => {
        const team = t.team || {};
        return {
          name: team.displayName || '-',
          abbr: team.abbreviation || '-',
          location: team.location || '-',
          venue: team.venue?.fullName || '-',
          color: team.color || '---'
        };
      });
    }

    function renderTeamsTab(filtered = '') {
      const rowsData = teamRows();
      const q = filtered.trim().toLowerCase();
      const rowsFiltered = q
        ? rowsData.filter(row => `${row.name} ${row.abbr} ${row.location}`.toLowerCase().includes(q))
        : rowsData;

      if (!rowsFiltered.length) return '<div class="empty">No teams matched your search.</div>';

      const rows = rowsFiltered.map(team => `<tr>
        <td>${team.name}</td><td>${team.abbr}</td><td>${team.location}</td><td>${team.venue}</td><td>#${team.color}</td>
      </tr>`).join('');

      return `<table>
        <thead><tr><th>Team</th><th>Abbr</th><th>Location</th><th>Venue</th><th>Color</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function renderActiveTab(search = '') {
      const title = document.getElementById('scoreboard-title');
      const leagueLabel = leagues[state.league].label;
      title.textContent = `${leagueLabel} Scoreboard · Live / Final Games`;

      const root = document.getElementById('tab-content');
      if (state.tab === 'Scores') root.innerHTML = renderScoresTab();
      if (state.tab === 'Standings') root.innerHTML = renderStandingsTab();
      if (state.tab === 'Schedule') root.innerHTML = renderScheduleTab();
      if (state.tab === 'Teams') root.innerHTML = renderTeamsTab(search);
    }

    async function loadLeagueData() {
      const loading = document.getElementById('scoreboard-loading');
      const grid = document.getElementById('games-grid');
      loading.style.display = 'block';
      grid.innerHTML = '';
      document.getElementById('tab-content').innerHTML = '<div class="empty">Loading league data...</div>';

      try {
        const cfg = leagues[state.league];
        const [scoreboard, standings, teams] = await Promise.all([
          fetchJson(cfg.scoreboard),
          fetchJson(cfg.standings),
          fetchJson(cfg.teams)
        ]);

        state.scoreboard = scoreboard;
        state.standings = standings;
        state.teams = teams;

        renderScoreboardCards();
        renderActiveTab(document.getElementById('search-input').value);
      } catch (err) {
        loading.textContent = 'Failed to load data. Please retry.';
        document.getElementById('tab-content').innerHTML = `<div class="empty">Error: ${err.message}</div>`;
      }
    }

    function bindSearch() {
      const input = document.getElementById('search-input');
      const btn = document.getElementById('search-btn');

      function runSearch() {
        state.tab = 'Teams';
        renderTabs();
        renderActiveTab(input.value);
      }

      btn.addEventListener('click', runSearch);
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') runSearch();
      });
    }

    function init() {
      if (!leagues[state.league]) state.league = 'nfl';
      renderLeagueToggle();
      renderTabs();
      bindSearch();
      loadLeagueData();
    }

    init();
  </script>
</body>
</html>
